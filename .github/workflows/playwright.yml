name: Playwright Tests

# เมื่อไหร่ให้รัน — ตอน push หรือ pull request ไปที่ main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    # รันบนเครื่องเสมือน Ubuntu (ของ GitHub)
    runs-on: ubuntu-latest

    steps:
      # 1. ดึง code จาก repo มาลงเครื่องเสมือน
      - uses: actions/checkout@v4

      # 2. ติดตั้ง Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. ลง dependencies (เพราะเครื่อง GitHub ไม่มี node_modules)
      - name: Install dependencies
        run: npm ci

      # 4. ลง browser ของ Playwright
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 5. รัน test
      - name: Run Playwright tests
        run: npx playwright test